name: Deploy to GitHub Pages

on:
  push:
    branches: [App]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Fix iPhone autocorrect and copy-paste artifacts
        run: |
          python3 - <<'PYEOF'
          import glob
          replacements = [
            ('\u2018', "'"), ('\u2019', "'"),
            ('\u201c', '"'), ('\u201d', '"'),
            ('\u2013', '-'), ('\u2014', '--'),
            ('\u2026', '...'), ('\u2501', '-'),
          ]
          fences = {'```', '```jsx', '```javascript'}
          for path in glob.glob('src/**/*.jsx', recursive=True) + glob.glob('src/**/*.js', recursive=True):
            with open(path, 'r', encoding='utf-8') as f:
              lines = f.readlines()
            cleaned = [l for l in lines if l.strip() not in fences]
            content = ''.join(cleaned)
            for bad, good in replacements:
              content = content.replace(bad, good)
            with open(path, 'w', encoding='utf-8') as f:
              f.write(content)
            removed = len(lines) - len(cleaned)
            print(f'Processed {path}: {removed} fences removed')
          PYEOF
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
