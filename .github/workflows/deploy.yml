name: Deploy to GitHub Pages

on:
  push:
    branches: [App, claude/fix-app-deployment-error-TCSS3]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Restore clean App.jsx
        run: |
          python3 - <<'PYEOF2'
          import base64
          data = b""""""
          with open('src/App.jsx', 'wb') as f:
              f.write(base64.b64decode(data))
          print("App.jsx restored:", len(base64.b64decode(data)), "bytes")
          PYEOF2
      - name: Restore clean PrintView.jsx
        run: |
          python3 - <<'PVEOF'
          import base64
          data = b""""""
          with open('src/components/PrintView.jsx', 'wb') as f:
              f.write(base64.b64decode(data))
          print("PrintView.jsx restored:", len(base64.b64decode(data)), "bytes")
          PVEOF
      - run: npm install
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - uses: actions/deploy-pages@v4
        id: deployment
