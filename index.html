<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Management App</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <!-- 1. Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Import Maps to fetch React, Lucide Icons, and Firebase directly from Cloud Servers -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.372.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
      }
    }
    </script>
    
    <!-- 3. Babel to compile React JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('SW registered!', reg))
            .catch(err => console.log('SW registration failed', err));
        });
      }
    </script>

    <!-- Where the React App will render -->
    <div id="root"></div>

    <!-- 4. The actual React Code -->
    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
          LayoutDashboard, Package, ReceiptText, BarChart3, Settings, 
          Plus, Search, Truck, CheckCircle2, AlertCircle, Users,
          Share2, Printer, Trash2, Edit, X, Lock, DollarSign, 
          TrendingUp, Receipt, FileSpreadsheet, Calendar, Save, ChevronRight,
          Wallet, Download, Upload, TrendingDown, Filter, ArrowUpDown, Award, CreditCard, Copy, Tag, MapPin
        } from 'lucide-react';

        // --- FIREBASE SETUP ---
        import { initializeApp } from "firebase/app";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "firebase/firestore";

        const firebaseConfig = {
          apiKey: "AIzaSyCT_q3KuVKaQZ_42xYtRa2zhwbw5TZ1DAQ",
          authDomain: "animalhealthpkapp.firebaseapp.com",
          projectId: "animalhealthpkapp",
          storageBucket: "animalhealthpkapp.firebasestorage.app",
          messagingSenderId: "467600105250",
          appId: "1:467600105250:web:12e44e1c8d294911a58f7b",
          measurementId: "G-RS28EF3TKW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- CONSTANTS & HELPERS ---
        const APP_NAME = "AnimalHealth.PK";
        const VEHICLES = ['Rider', 'Rickshaw', 'Suzuki', 'Intercity Transport', 'Self-Pickup'];

        const getLocalDateStr = (date = new Date()) => {
          const offset = date.getTimezoneOffset() * 60000;
          return new Date(date.getTime() - offset).toISOString().split('T')[0];
        };

        const checkDateFilter = (dateStr, filter) => {
          if (filter === 'All Time') return true;
          const targetDate = new Date(dateStr);
          const now = new Date();
          if (filter === 'Today') return targetDate.toDateString() === now.toDateString();
          if (filter === 'This Week') {
            const startOfWeek = new Date(now);
            startOfWeek.setDate(now.getDate() - now.getDay());
            startOfWeek.setHours(0,0,0,0);
            return targetDate >= startOfWeek;
          }
          if (filter === 'This Month') return targetDate.getMonth() === now.getMonth() && targetDate.getFullYear() === now.getFullYear();
          if (filter === 'This Year') return targetDate.getFullYear() === now.getFullYear();
          return true;
        };

        const exportToCSV = (data, filename) => {
          if(!data || !data.length) return;
          const headers = Object.keys(data[0]).join(',');
          const rows = data.map(obj => Object.values(obj).map(val => `"${val}"`).join(',')).join('\n');
          const blob = new Blob([headers + '\n' + rows], { type: 'text/csv' });
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = filename; a.click();
        };

        // --- LIVE FIREBASE SYNC HOOK ---
        function useLiveCollection(collectionName) {
          const [data, setData] = useState([]);
          
          useEffect(() => {
            const unsubscribe = onSnapshot(collection(db, collectionName), (snapshot) => {
              const items = [];
              snapshot.forEach((doc) => items.push(doc.data()));
              setData(items.sort((a, b) => (a.id > b.id ? 1 : -1)));
            }, (error) => {
              console.error(`Error fetching ${collectionName}:`, error);
            });

            return () => unsubscribe();
          }, [collectionName]);

          return data;
        }

        // --- MAIN APP COMPONENT ---
        function App() {
          // --- Global State ---
          const [currentUser, setCurrentUser] = useState(() => {
            try {
              const item = window.localStorage.getItem('app_currentUser');
              return item ? JSON.parse(item) : null;
            } catch (error) { return null; }
          });

          useEffect(() => {
            if (currentUser) {
              window.localStorage.setItem('app_currentUser', JSON.stringify(currentUser));
            } else {
              window.localStorage.removeItem('app_currentUser');
            }
          }, [currentUser]);

          const [loginForm, setLoginForm] = useState({ name: '', password: '' });
          const [activeTab, setActiveTab] = useState('dashboard'); 
          const [adminView, setAdminView] = useState('analytics'); 
          const [toast, setToast] = useState(null);

          // --- Data State (Live from Firebase) ---
          const appUsers = useLiveCollection('app_users');
          const companies = useLiveCollection('companies');
          const products = useLiveCollection('products');
          const customers = useLiveCollection('customers');
          const invoices = useLiveCollection('invoices');
          const expenses = useLiveCollection('expenses');
          const expenseCategories = useLiveCollection('expenseCategories');
          const payments = useLiveCollection('payments'); 

          // Complex UI State
          const [billingView, setBillingView] = useState('list'); 
          const [currentInvoice, setCurrentInvoice] = useState(null);
          const [showProductModal, setShowProductModal] = useState(false);
          const [editingProduct, setEditingProduct] = useState(null);
          const [showCustomerModal, setShowCustomerModal] = useState(false);
          const [editingCustomer, setEditingCustomer] = useState(null);
          const [showPaymentModal, setShowPaymentModal] = useState(false);
          const [selectedCustomerForPayment, setSelectedCustomerForPayment] = useState(null);
          const [showLedgerModal, setShowLedgerModal] = useState(false);
          const [selectedLedgerId, setSelectedLedgerId] = useState(null);
          const [showExpenseCatModal, setShowExpenseCatModal] = useState(false);
          const [showUserModal, setShowUserModal] = useState(false);
          const [editingUser, setEditingUser] = useState(null);
          const [printConfig, setPrintConfig] = useState(null);

          const isAdmin = currentUser?.role === 'admin';

          // --- General Helpers ---
          const showToast = (msg, type = 'success') => {
            setToast({ msg, type });
            setTimeout(() => setToast(null), 3000);
          };

          const getCompanyName = (id) => companies.find(c => c.id === id)?.name || 'Unknown';

          const checkDuplicate = (list, name, excludeId = null) => {
            return list.some(item => item.name.toLowerCase() === name.toLowerCase() && item.id !== excludeId);
          };

          const handleLogin = async (e) => {
            e.preventDefault();
            
            // First-time DB initialization logic
            if (appUsers.length === 0 && loginForm.name.toLowerCase() === 'tahir' && loginForm.password === '7869') {
               const initUser = { id: Date.now().toString(), name: 'Tahir', password: '7869', role: 'admin' };
               await saveToFirebase('app_users', initUser.id, initUser);
               
               if (expenseCategories.length === 0) {
                  const defaultCats = ['Transport', 'Utility Bill', 'Staff Food/Tea', 'Maintenance', 'Other'];
                  defaultCats.forEach((cat, i) => saveToFirebase('expenseCategories', Date.now()+i, { id: Date.now()+i, name: cat }));
               }
               
               setCurrentUser(initUser);
               showToast("Welcome! Clean Database Initialized.");
               return;
            }

            const user = appUsers.find(u => u.name.toLowerCase() === loginForm.name.toLowerCase() && u.password === loginForm.password);
            if (user) {
              setCurrentUser(user);
              showToast(`Welcome ${user.name}`);
            } else {
              showToast("Invalid Credentials", "error");
            }
          };

          const saveToFirebase = async (collectionName, id, dataObj) => {
            try {
              await setDoc(doc(db, collectionName, String(id)), dataObj);
            } catch (e) {
              console.error("Firebase Write Error:", e);
              showToast("Network Error - Could not save", "error");
            }
          };

          const deleteFromFirebase = async (collectionName, id) => {
            try {
              await deleteDoc(doc(db, collectionName, String(id)));
            } catch (e) {
              console.error("Firebase Delete Error:", e);
              showToast("Network Error - Could not delete", "error");
            }
          };

          // --- Ledger Engine ---
          const getCustomerLedger = (customerId) => {
            const customer = customers.find(c => c.id === customerId);
            if (!customer) return null;
            const openingBal = customer.openingBalance || 0;
            let entries = [];

            invoices.filter(o => o.customerId === customerId && o.status === 'Billed').forEach(inv => {
                entries.push({ id: inv.id, date: inv.date, ref: inv.id, desc: 'Sales Invoice', debit: inv.total, credit: 0, timestamp: new Date(inv.date).getTime() });
                if (inv.receivedAmount > 0) {
                    entries.push({ id: `${inv.id}-PAY`, date: inv.date, ref: inv.id, desc: 'Payment (On Invoice)', debit: 0, credit: Number(inv.receivedAmount), timestamp: new Date(inv.date).getTime() + 1 });
                }
            });

            payments.filter(p => p.customerId === customerId).forEach(pay => {
                entries.push({ id: pay.id, date: pay.date, ref: pay.id, desc: pay.note || 'Payment Received', debit: 0, credit: Number(pay.amount), timestamp: new Date(pay.date).getTime() + 2 });
            });

            entries.sort((a, b) => a.timestamp === b.timestamp ? a.id.localeCompare(b.id) : a.timestamp - b.timestamp);

            let runningBal = openingBal;
            let totalDebit = 0;
            let totalCredit = 0;

            const rows = entries.map(entry => {
                runningBal += entry.debit;
                runningBal -= entry.credit;
                totalDebit += entry.debit;
                totalCredit += entry.credit;
                return { ...entry, balance: runningBal };
            });

            return { id: customer.id, customerName: customer.name, phone: customer.phone, openingBal, rows, totalDebit, totalCredit, closingBal: runningBal };
          };

          const getCustomerBalance = (customerId) => {
             const ledger = getCustomerLedger(customerId);
             return ledger ? ledger.closingBal : 0;
          };

          const generateReceiptData = (ledger, rowId) => {
              const row = ledger.rows.find(r => r.id === rowId);
              if(!row) return null;
              const isInvoicePayment = row.id.endsWith('-PAY');
              const actualId = isInvoicePayment ? row.ref : row.id;
              
              const entryIndex = ledger.rows.findIndex(r => r.id === row.id);
              const prevBalance = entryIndex > 0 ? ledger.rows[entryIndex - 1].balance : ledger.openingBal;

              return {
                  id: actualId,
                  date: row.date,
                  customerName: ledger.customerName,
                  receivedAmount: row.credit,
                  prevBalance: prevBalance,
                  newBalance: row.balance,
                  note: row.desc
              };
          };

          // --- Print Engine ---
          if (printConfig) {
            const { docType, format, data } = printConfig;
            const isThermal = format === 'thermal';

            const getDispatchQtyStr = (item) => {
              let uib = item.unitsInBox;
              if (!uib) {
                 const prod = products.find(p => p.id === item.productId);
                 uib = prod ? prod.unitsInBox : 1;
              }
              uib = Number(uib) || 1;
              const qty = Number(item.quantity) || 0;
              
              if (uib <= 1) return `${qty}`;
              
              const boxes = Math.floor(qty / uib);
              const loose = qty % uib;
              const boxText = boxes === 1 ? 'Box' : 'Boxes';
              
              if (boxes > 0 && loose > 0) return `${boxes} ${boxText}, ${loose} Loose`;
              if (boxes > 0) return `${boxes} ${boxText}`;
              return `${loose} Loose`;
            };
            
            const generateShareText = () => {
              let text = `*AnimalHealth.PK*\n`;
              if (docType === 'invoice') {
                text += `*INVOICE #${data.id}*\nDate: ${data.date}\nCustomer: ${data.customerName}\n\n*Items:*\n`;
                let savings = 0;
                data.items.forEach(i => {
                   text += `- ${i.name} ${i.isBonus ? '(BONUS) ' : ''}(x${i.quantity}): ${i.isBonus ? 'FREE' : 'Rs.' + (i.price * i.quantity)}\n`;
                   if (i.isBonus) savings += ((i.originalPrice || 0) * i.quantity);
                });
                if (data.deliveryBilled > 0) text += `Delivery: Rs.${data.deliveryBilled}\n`;
                text += `\n*Current Bill: Rs.${data.total}*\n`;
                if (savings > 0) text += `*Total Savings: Rs.${savings}*\n`;
                text += `Status: ${data.paymentStatus}`;
              } else if (docType === 'dispatch') {
                text += `*DISPATCH NOTE #${data.id}*\n`;
                text += `Date: ${data.date}\n`;
                text += `*Customer:* ${data.customerName}\n`;
                
                if(data.customerDetails?.contactPerson || data.customerDetails?.phone) {
                   text += `*Contact:* ${data.customerDetails?.contactPerson || 'N/A'} - ${data.customerDetails?.phone || ''}\n`;
                }
                if(data.customerDetails?.address1) text += `*Address 1:* ${data.customerDetails.address1}\n`;
                if(data.customerDetails?.map1) text += `*Map 1:* ${data.customerDetails.map1}\n`;
                if(data.customerDetails?.address2) text += `*Address 2:* ${data.customerDetails.address2}\n`;
                if(data.customerDetails?.map2) text += `*Map 2:* ${data.customerDetails.map2}\n`;
                
                text += `\n*Vehicle/Transport:* ${data.vehicle}\n`;
                if(data.vehicle === 'Intercity Transport') {
                   text += `Transport Co: ${data.transportCompany || 'N/A'}\nBilty No: ${data.biltyNumber || 'N/A'}\n`;
                } else if (['Rider', 'Rickshaw', 'Suzuki'].includes(data.vehicle)) {
                   text += `Driver: ${data.driverName || 'N/A'} - ${data.driverPhone || ''}\n`;
                }

                text += `\n*Items to Deliver:*\n`;
                data.items.forEach(i => text += `- ${i.name} ${i.isBonus ? '🎁 (BONUS)' : ''} -> ${getDispatchQtyStr(i)}\n`);
              } else if (docType === 'receipt') {
                text += `*PAYMENT RECEIPT*\nRef: ${data.id}\nDate: ${data.date}\nCustomer: ${data.customerName}\n\n`;
                text += `*Amount Received: Rs.${data.receivedAmount}*\n`;
                text += `Previous Balance: Rs.${data.prevBalance}\n`;
                text += `*Remaining Balance: Rs.${data.newBalance}*\n\n`;
                text += `Thank you for your business!`;
              } else if (docType === 'ledger') {
                 text += `*ACCOUNT STATEMENT*\nCustomer: ${data.customerName}\nStatement Period: ${data.dateRange.start} to ${data.dateRange.end}\n\n`;
                 text += `Total Debits: Rs.${data.totalDebit}\nTotal Credits: Rs.${data.totalCredit}\n*Current Closing Balance: Rs.${data.closingBal}*\n\nPlease arrange payment at your earliest convenience.`;
              }
              return encodeURIComponent(text);
            };

            return (
              <div className={`bg-white min-h-screen text-black ${isThermal ? 'w-[80mm] mx-auto p-4 text-[12px]' : 'w-full max-w-[210mm] mx-auto p-8 text-sm'}`}>
                <div className="print:hidden flex justify-between items-center mb-6 bg-slate-100 p-4 rounded-xl border border-slate-200">
                   <div className="flex gap-2">
                     <button onClick={() => setPrintConfig({...printConfig, format: 'thermal'})} className={`px-4 py-2 rounded-lg font-bold text-xs ${isThermal?'bg-slate-800 text-white':'bg-white text-slate-600 border'}`}>Thermal (80mm)</button>
                     <button onClick={() => setPrintConfig({...printConfig, format: 'a5'})} className={`px-4 py-2 rounded-lg font-bold text-xs ${!isThermal?'bg-slate-800 text-white':'bg-white text-slate-600 border'}`}>A4 / A5 Sheet</button>
                   </div>
                   <button onClick={() => setPrintConfig(null)} className="p-2 bg-red-100 text-red-600 rounded-full hover:bg-red-200 transition-colors"><X size={20}/></button>
                </div>

                <div className="text-center mb-6 border-b-2 border-slate-800 pb-4">
                  <h1 className={`${isThermal ? 'text-2xl' : 'text-4xl'} font-extrabold uppercase tracking-tight`}>{APP_NAME}</h1>
                  <p className="uppercase tracking-widest font-semibold mt-1 text-[10px] sm:text-xs text-slate-600">Wholesale Veterinary Pharmacy</p>
                  <div className="mt-4 inline-block bg-slate-900 text-white px-4 py-1.5 rounded-full font-bold uppercase tracking-widest text-xs">
                     {docType === 'invoice' && 'Invoice'}
                     {docType === 'dispatch' && 'Dispatch Note'}
                     {docType === 'receipt' && 'Payment Receipt'}
                     {docType === 'ledger' && 'Account Ledger'}
                     {docType === 'report' && 'Analytics Report'}
                  </div>
                </div>
                
                {docType !== 'report' && (
                   <div className="mb-6 flex justify-between items-start font-medium text-slate-800">
                     <div>
                       <p className="text-slate-500 text-xs uppercase font-bold tracking-wider mb-1">Customer Details</p>
                       <p className="text-lg font-bold">{data.customerName}</p>
                       
                       {/* Enhanced Dispatch Note Customer Details */}
                       {docType === 'dispatch' && data.customerDetails && (
                         <div className="mt-2 text-xs space-y-1 text-slate-700 bg-slate-50 p-2 rounded border border-slate-200">
                            {(data.customerDetails.contactPerson || data.customerDetails.phone) && (
                               <p><strong>Contact:</strong> {data.customerDetails.contactPerson || 'N/A'} ({data.customerDetails.phone || ''})</p>
                            )}
                            {data.customerDetails.address1 && <p><strong>Addr 1:</strong> {data.customerDetails.address1}</p>}
                            {data.customerDetails.address2 && <p><strong>Addr 2:</strong> {data.customerDetails.address2}</p>}
                         </div>
                       )}
                       {docType === 'ledger' && <p className="text-sm text-slate-600">{data.phone}</p>}
                     </div>
                     <div className="text-right">
                        {docType !== 'ledger' && (
                          <>
                            <p className="text-slate-500 text-xs uppercase font-bold tracking-wider mb-1">Reference</p>
                            <p className="font-semibold">{data.id}</p>
                            <p className="text-slate-600">{data.date}</p>
                          </>
                        )}
                        {docType === 'ledger' && (
                          <>
                            <p className="text-slate-500 text-xs uppercase font-bold tracking-wider mb-1">Statement Date</p>
                            <p className="font-semibold">{getLocalDateStr()}</p>
                          </>
                        )}
                     </div>
                   </div>
                )}

                {/* Dispatch Note Logistics Block */}
                {docType === 'dispatch' && (
                   <div className="mb-6 bg-slate-50 p-3 rounded-lg border border-slate-300 text-xs text-slate-800">
                      <p className="font-bold uppercase tracking-wider text-[10px] text-slate-500 mb-1">Logistics / Delivery Info</p>
                      <p><strong>Method:</strong> {data.vehicle}</p>
                      {data.vehicle === 'Intercity Transport' ? (
                         <p><strong>Transport Co:</strong> {data.transportCompany || '-'} &nbsp;|&nbsp; <strong>Bilty No:</strong> {data.biltyNumber || '-'}</p>
                      ) : ['Rider', 'Rickshaw', 'Suzuki'].includes(data.vehicle) ? (
                         <p><strong>Driver:</strong> {data.driverName || '-'} &nbsp;|&nbsp; <strong>Phone:</strong> {data.driverPhone || '-'}</p>
                      ) : null}
                   </div>
                )}

                {/* Dynamic Report Printing */}
                {docType === 'report' && (
                   <div className="space-y-4 text-slate-800">
                      <div className="flex justify-between items-end mb-4 border-b pb-2">
                         <h2 className="text-lg font-extrabold">{data.title}</h2>
                         <p className="text-xs font-bold text-slate-500 uppercase">Period: {data.dateFilter}</p>
                      </div>

                      {data.view === 'Overview' ? (
                         <div className="space-y-2 max-w-sm mx-auto border p-4 rounded-xl text-base">
                            <div className="flex justify-between"><span>Product Sales:</span> <span>Rs. {data.stats.productRevenue.toLocaleString()}</span></div>
                            <div className="flex justify-between text-rose-600"><span>Total COGS:</span> <span>- Rs. {data.stats.totalCOGS.toLocaleString()}</span></div>
                            <div className="flex justify-between font-bold"><span>Gross Margin:</span> <span>Rs. {data.stats.grossMargin.toLocaleString()}</span></div>
                            <div className="border-t my-2"></div>
                            <div className="flex justify-between text-sm"><span>Delivery Billed:</span> <span>+ Rs. {data.stats.deliveryBilled.toLocaleString()}</span></div>
                            <div className="flex justify-between text-sm text-rose-600"><span>Transport Exp:</span> <span>- Rs. {data.stats.transportExpense.toLocaleString()}</span></div>
                            <div className="flex justify-between text-sm text-rose-600"><span>Operational Exp:</span> <span>- Rs. {data.stats.totalExpenses.toLocaleString()}</span></div>
                            <div className="border-t my-2 pt-2 flex justify-between font-extrabold text-xl"><span>Net Profit:</span> <span>Rs. {data.stats.netProfit.toLocaleString()}</span></div>
                         </div>
                      ) : (
                         <table className="w-full text-left text-xs sm:text-sm border-collapse">
                            <thead className="border-b-2 border-slate-800 text-slate-700">
                               <tr>
                                  <th className="py-2 font-bold">Name</th>
                                  {data.view !== 'Receivables' && <th className="py-2 text-center font-bold">Qty</th>}
                                  {data.view !== 'Receivables' && <th className="py-2 text-right font-bold">Revenue</th>}
                                  <th className="py-2 text-right font-bold">{data.view === 'Receivables' ? 'Pending Amount' : 'Gross Profit'}</th>
                               </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-200">
                               {data.rows.map((r, i) => (
                                  <tr key={i}>
                                     <td className="py-2 font-semibold">{r.Name} {r.Company ? <span className="text-[10px] text-slate-500">({r.Company})</span> : ''}</td>
                                     {data.view !== 'Receivables' && <td className="py-2 text-center">{r.Qty}</td>}
                                     {data.view !== 'Receivables' && <td className="py-2 text-right">Rs. {r.Revenue.toLocaleString()}</td>}
                                     <td className="py-2 text-right font-bold text-slate-800">Rs. {(r.GrossProfit || r.Amount).toLocaleString()}</td>
                                  </tr>
                               ))}
                            </tbody>
                         </table>
                      )}
                   </div>
                )}

                {(docType === 'invoice' || docType === 'dispatch') && (
                  <>
                    <table className="w-full text-left mb-6 border-collapse">
                      <thead>
                        <tr className="border-b-2 border-slate-800 text-slate-700">
                          <th className="py-2 font-bold">Description</th>
                          <th className="py-2 text-center font-bold">{docType === 'dispatch' ? 'Packaging' : 'Qty'}</th>
                          {docType === 'invoice' && <th className="py-2 text-right font-bold">Price</th>}
                          {docType === 'invoice' && <th className="py-2 text-right font-bold">Total</th>}
                        </tr>
                      </thead>
                      <tbody>
                        {data.items.map((item, idx) => (
                          <tr key={idx} className="border-b border-slate-200 text-slate-800">
                            <td className="py-2 font-semibold">
                               {item.name}
                               {item.isBonus && <span className="ml-2 px-1.5 py-0.5 bg-emerald-100 text-emerald-700 text-[9px] font-bold rounded uppercase border border-emerald-200">Bonus</span>}
                            </td>
                            <td className="py-2 text-center font-medium">{docType === 'dispatch' ? getDispatchQtyStr(item) : item.quantity}</td>
                            {docType === 'invoice' && (

              const totalItems = currentInvoice.items.reduce((sum, i) => sum + (i.price * i.quantity), 0);

              const activeCustomer = customers.find(c => c.id === currentInvoice.customerId);
              
              const finalInvoice = { 
                 ...currentInvoice, 
                 total: grandTotal,

                 salespersonId: currentUser.id,

                 customerDetails: activeCustomer ? {

                     map1: activeCustomer.map1 || '',
                     address2: activeCustomer.address2 || '',
                     map2: activeCustomer.map2 || ''

              };

                finalInvoice.id = `INV-${Math.floor(Math.random()*10000)}`;
                finalInvoice.date = getLocalDateStr();
              }
              
              await saveToFirebase('invoices', finalInvoice.id, finalInvoice);
              showToast(currentInvoice.id ? "Invoice Updated" : `Invoice ${status}`);
              setBillingView('list');
            };

            const inputClass = "w-full p-3 bg-white border border-slate-200 rounded-xl text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all shadow-sm text-slate-800 placeholder-slate-400";

            const handleAddItem = (p, isBonus) => {
              const uniqueId = isBonus ? `${p.id}_bonus` : p.id;
              const existing = currentInvoice.items.find(i => (i.uniqueId || i.productId) === uniqueId);
              
              let historicalPrice = p.sellingPrice;
              if (!isBonus && currentInvoice.customerId) {
                  const pastInvs = invoices.filter(inv => inv.customerId === currentInvoice.customerId).sort((a,b) => new Date(b.date) - new Date(a.date) || b.id.localeCompare(a.id));
                  for (let inv of pastInvs) {
                      const pastItem = inv.items.find(i => (i.productId === p.id || i.uniqueId === p.id) && !i.isBonus);
                      if (pastItem && pastItem.price !== undefined) { 
                          historicalPrice = pastItem.price; 
                          break; 
                      }
                  }

                       <button onClick={()=>setAdminView('expenses')} className={`flex-1 py-2 px-3 rounded-lg font-bold text-xs flex items-center justify-center gap-1.5 whitespace-nowrap ${adminView==='expenses'?'bg-white text-rose-600 shadow-sm':'text-slate-500'}`}><Wallet size={14}/> Expenses</button>
                       <button onClick={()=>setAdminView('bulk')} className={`flex-1 py-2 px-3 rounded-lg font-bold text-xs flex items-center justify-center gap-1.5 whitespace-nowrap ${adminView==='bulk'?'bg-white text-emerald-600 shadow-sm':'text-slate-500'}`}><Upload size={14}/> Bulk Ops</button>
                       <button onClick={()=>setAdminView('users')} className={`flex-1 py-2 px-3 rounded-lg font-bold text-xs flex items-center justify-center gap-1.5 whitespace-nowrap ${adminView==='users'?'bg-white text-amber-600 shadow-sm':'text-slate-500'}`}><Users size={14}/> Users</button>

                 <div className="flex-1 overflow-hidden">
                    {adminView === 'analytics' && <AnalyticsView />}
                    {adminView === 'expenses' && <ExpensesView />}
                    {adminView === 'bulk' && <BulkOpsView />}
                    {adminView === 'users' && <UserManagementView />}

          const UserManagementView = () => {
             return (
                <div className="h-full flex flex-col p-4 pb-24">
                   <div className="flex justify-between items-center mb-4">
                      <h3 className="text-xs font-bold text-slate-800 uppercase tracking-widest">Team Performance</h3>
                      <button onClick={() => { setEditingUser(null); setShowUserModal(true); }} className="bg-indigo-600 text-white px-3 py-2 rounded-lg text-xs font-bold shadow-sm flex items-center gap-1 hover:bg-indigo-700 transition-colors"><Plus size={14}/> Add User</button>
                   </div>
                   <div className="space-y-3 overflow-y-auto flex-1 pr-1">
                      {appUsers.map(u => {
                         const userInvoices = invoices.filter(inv => inv.salespersonId === u.id && inv.status === 'Billed');
                         const totalSales = userInvoices.reduce((sum, inv) => sum + inv.total, 0);
                         return (
                            <div key={u.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                               <div className="flex justify-between items-start mb-2">
                                  <div>
                                     <h4 className="font-bold text-slate-800 text-base">{u.name}</h4>
                                     <span className={`text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded mt-1 inline-block border ${u.role === 'admin' ? 'bg-indigo-50 text-indigo-700 border-indigo-200' : 'bg-emerald-50 text-emerald-700 border-emerald-200'}`}>{u.role}</span>
                                  </div>
                                  <div className="flex gap-1.5">
                                     <button onClick={() => { setEditingUser(u); setShowUserModal(true); }} className="p-2 bg-slate-50 text-slate-600 rounded-lg hover:bg-slate-100 transition-colors"><Edit size={16}/></button>
                                     <button onClick={async () => { if(window.confirm(`Permanently delete user ${u.name}?`)) await deleteFromFirebase('app_users', u.id); }} className="p-2 bg-rose-50 text-rose-600 rounded-lg hover:bg-rose-100 transition-colors"><Trash2 size={16}/></button>
                                  </div>
                               </div>
                               <div className="grid grid-cols-2 gap-2 mt-4 pt-4 border-t border-slate-100">
                                  <div>
                                     <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Billed Invoices</p>
                                     <p className="font-extrabold text-slate-700 text-lg">{userInvoices.length}</p>
                                  </div>
                                  <div>
                                     <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Total Revenue generated</p>
                                     <p className="font-extrabold text-emerald-600 text-lg">Rs. {totalSales.toLocaleString()}</p>
                                  </div>
                               </div>
                            </div>
                         );
                      })}
                   </div>
                </div>
             );
          };

          const AnalyticsView = () => {
            const [view, setView] = useState('Overview');
            const [dateFilter, setDateFilter] = useState('This Month');
            const [filterCompany, setFilterCompany] = useState('');
            const [filterCustomer, setFilterCustomer] = useState('');
            const [sortBy, setSortBy] = useState('profit'); 

            const reportEngine = useMemo(() => {
              let billedForPnL = invoices.filter(o => o.status === 'Billed' && checkDateFilter(o.date, dateFilter));
              if(filterCustomer) billedForPnL = billedForPnL.filter(o => o.customerId === Number(filterCustomer));

              const kpis = { productRevenue: 0, totalCOGS: 0, grossMargin: 0, deliveryBilled: 0, transportExpense: 0, totalReceivables: 0 };
              const byProduct = {}; const byCompany = {}; const byCustomer = {}; const receivablesList = [];

              customers.forEach(c => {
                 const bal = getCustomerBalance(c.id);
                 if(bal > 0) {
                    kpis.totalReceivables += bal;
                    receivablesList.push({ name: c.name, amount: bal });
                 }
              });

              billedForPnL.forEach(o => {
                kpis.deliveryBilled += Number(o.deliveryBilled || 0);
                kpis.transportExpense += Number(o.transportExpense || 0);

                if(!byCustomer[o.customerName]) byCustomer[o.customerName] = { productRevenue: 0, cost: 0, profit: 0, orders: 0 };
                byCustomer[o.customerName].orders += 1;

                let orderItemRevenue = 0; let orderItemCost = 0;

                o.items.forEach(item => {
                  const itemCompanyId = products.find(p=>p.id===item.productId)?.companyId;
                  if(filterCompany && itemCompanyId !== Number(filterCompany)) return;

                  const itemRev = item.price * item.quantity;
                  const itemCost = item.costPrice * item.quantity;
                  orderItemRevenue += itemRev; orderItemCost += itemCost;

                  if(!byProduct[item.name]) byProduct[item.name] = { qty: 0, revenue: 0, cost: 0, profit: 0, company: item.company };
                  byProduct[item.name].qty += item.quantity; byProduct[item.name].revenue += itemRev; byProduct[item.name].cost += itemCost; byProduct[item.name].profit += (itemRev - itemCost);

                  if(!byCompany[item.company]) byCompany[item.company] = { qty: 0, revenue: 0, cost: 0, profit: 0 };
                  byCompany[item.company].qty += item.quantity; byCompany[item.company].revenue += itemRev; byCompany[item.company].cost += itemCost; byCompany[item.company].profit += (itemRev - itemCost);
                });

                kpis.productRevenue += orderItemRevenue; kpis.totalCOGS += orderItemCost;
                byCustomer[o.customerName].productRevenue += orderItemRevenue; byCustomer[o.customerName].cost += orderItemCost; byCustomer[o.customerName].profit += (orderItemRevenue - orderItemCost);
              });

              kpis.grossMargin = kpis.productRevenue - kpis.totalCOGS;
              const filteredExpenses = expenses.filter(e => checkDateFilter(e.date, dateFilter)).reduce((sum, e) => sum + Number(e.amount), 0);
              kpis.totalExpenses = filteredExpenses;
              kpis.netProfit = kpis.grossMargin + (kpis.deliveryBilled - kpis.transportExpense) - kpis.totalExpenses;

              return { kpis, byProduct, byCompany, byCustomer, receivablesList: receivablesList.sort((a,b)=>b.amount - a.amount) };
            }, [invoices, expenses, dateFilter, filterCompany, filterCustomer, products, customers]);

            const getSortedExportData = () => {
               if (view === 'Overview') return null;
               if (view === 'Receivables') return reportEngine.receivablesList.map(r => ({ Name: r.name, Amount: r.amount }));
               const dataObj = view === 'By Product' ? reportEngine.byProduct : view === 'By Company' ? reportEngine.byCompany : reportEngine.byCustomer;
               let arr = Object.entries(dataObj).map(([key, val]) => ({ key, ...val })).sort((a,b) => b[sortBy] - a[sortBy]);
               return arr.map(r => ({ Name: r.key, Company: r.company || '', Qty: r.qty || 0, Revenue: r.revenue || r.productRevenue || 0, GrossProfit: r.profit || 0 }));
            };

            const handleExport = (format) => {
                const title = `Analytics - ${view}`;
                const exportData = getSortedExportData();

                if (format === 'csv') {
                    if(view === 'Overview') return showToast("Cannot export Overview as CSV", "error");
                    exportToCSV(exportData, `${title.replace(/ /g, '_')}_${dateFilter}.csv`);
                } else if (format === 'pdf') {
                    setPrintConfig({ docType: 'report', format: 'a5', data: { title, dateFilter, view, stats: reportEngine.kpis, rows: exportData } });
                } else if (format === 'text') {
                    let text = `*${APP_NAME} | ${title}*\nPeriod: ${dateFilter}\n\n`;
                    if (view === 'Overview') {
                       text += `Product Sales: Rs. ${reportEngine.kpis.productRevenue}\nTotal COGS: Rs. ${reportEngine.kpis.totalCOGS}\nGross Margin: Rs. ${reportEngine.kpis.grossMargin}\nDelivery Billed: Rs. ${reportEngine.kpis.deliveryBilled}\nTransport Exp: Rs. ${reportEngine.kpis.transportExpense}\nOperational Exp: Rs. ${reportEngine.kpis.totalExpenses}\n*Net Profit: Rs. ${reportEngine.kpis.netProfit}*\n`;
                    } else {
                       exportData.forEach((r, i) => { text += `${i+1}. *${r.Name}* ${r.Company ? `(${r.Company})` : ''}\n   Qty: ${r.Qty} | Rev: Rs.${r.Revenue} | Profit: Rs.${r.GrossProfit || r.Amount}\n`; });
                    }
                    navigator.clipboard.writeText(text);
                    showToast("Report copied to clipboard!");
                }
            };

            const renderTable = (dataObj, type) => {
              let arr = Object.entries(dataObj).map(([key, val]) => ({ key, ...val })).sort((a,b) => b[sortBy] - a[sortBy]);
              return (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mt-4">
                   {type !== 'Customer' && (
                      <div className="bg-slate-50 border-b border-slate-200 p-2 flex justify-end">
                        <select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="bg-white border border-slate-200 rounded px-2 py-1 text-xs font-bold text-slate-600 outline-none">
                           <option value="profit">Sort: Highest Profit</option>
                           <option value="revenue">Sort: Highest Value</option>
                           <option value="qty">Sort: Highest Qty</option>
                        </select>
                      </div>
                   )}
                   <div className="overflow-x-auto">
                     <table className="w-full text-left text-xs whitespace-nowrap">
                        <thead className="bg-slate-50 text-slate-500 uppercase font-bold tracking-wider border-b border-slate-200">
                          <tr><th className="p-4">{type}</th>{type !== 'Customer' && <th className="p-4 text-center">Qty</th>}<th className="p-4 text-right">Revenue</th><th className="p-4 text-right text-emerald-600">Gross</th></tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100 font-semibold text-slate-700">
                          {arr.map((row, i) => (
                            <tr key={i} className="hover:bg-slate-50">
                               <td className="p-4">{row.key} {row.company ? <span className="text-[9px] text-slate-400 block mt-0.5 uppercase tracking-widest">{row.company}</span> : ''}</td>
                               {type !== 'Customer' && <td className="p-4 text-center bg-slate-50/50">{row.qty}</td>}
                               <td className="p-4 text-right text-slate-800 font-bold">Rs. {(row.revenue || row.productRevenue).toLocaleString()}</td>
                               <td className="p-4 text-right text-emerald-600 font-bold">Rs. {row.profit.toLocaleString()}</td>
                            </tr>
                          ))}
                        </tbody>
                     </table>
                   </div>
                </div>
              );
            };

            return (
              <div className="h-full flex flex-col p-4">
                <div className="flex gap-2 mb-3 overflow-x-auto scrollbar-hide shrink-0">
                   <div className="flex items-center gap-1.5 bg-white px-2.5 py-1.5 rounded-lg border border-slate-200 shadow-sm shrink-0">
                     <Calendar size={14} className="text-indigo-500" />
                     <select value={dateFilter} onChange={e => setDateFilter(e.target.value)} className="bg-transparent font-bold text-[11px] text-slate-700 outline-none cursor-pointer">
                        <option>Today</option><option>This Week</option><option>This Month</option><option>This Year</option><option>All Time</option>
                     </select>
                   </div>
                   <div className="flex items-center gap-1.5 bg-white px-2.5 py-1.5 rounded-lg border border-slate-200 shadow-sm shrink-0">
                     <Filter size={14} className="text-slate-400" />
                     <select value={filterCompany} onChange={e => setFilterCompany(e.target.value)} className="bg-transparent font-bold text-[11px] text-slate-700 outline-none cursor-pointer w-24">
                        <option value="">All Brands</option>
                        {companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                     </select>
                   </div>
                   <div className="flex items-center gap-1.5 bg-white px-2.5 py-1.5 rounded-lg border border-slate-200 shadow-sm shrink-0">
                     <Users size={14} className="text-slate-400" />
                     <select value={filterCustomer} onChange={e => setFilterCustomer(e.target.value)} className="bg-transparent font-bold text-[11px] text-slate-700 outline-none cursor-pointer w-24">
                        <option value="">All Clients</option>
                        {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                     </select>
                   </div>
                </div>

                <div className="flex gap-2 overflow-x-auto pb-3 scrollbar-hide shrink-0">
                   {['Overview', 'By Product', 'By Company', 'By Customer', 'Receivables'].map(v => (
                     <button key={v} onClick={() => setView(v)} className={`px-4 py-2 rounded-xl font-bold text-xs whitespace-nowrap shadow-sm transition-colors ${view === v ? 'bg-slate-800 text-white' : 'bg-white text-slate-600 border border-slate-200'}`}>{v}</button>
                   ))}
                </div>

                <div className="flex justify-between items-center bg-indigo-50/50 border border-indigo-100 p-2 rounded-xl mb-1 shrink-0">
                    <span className="text-xs font-bold text-indigo-700 ml-2 uppercase tracking-widest">Share Report</span>
                    <div className="flex gap-2">
                       <button onClick={()=>handleExport('text')} title="Copy Text" className="p-2 bg-white text-slate-600 rounded-lg shadow-sm border border-slate-200"><Copy size={16}/></button>
                       {view !== 'Overview' && <button onClick={()=>handleExport('csv')} title="Export CSV" className="p-2 bg-white text-slate-600 rounded-lg shadow-sm border border-slate-200"><Download size={16}/></button>}
                       <button onClick={()=>handleExport('pdf')} title="Print / PDF" className="p-2 bg-indigo-600 text-white rounded-lg shadow-sm"><Printer size={16}/></button>
                    </div>
                </div>

                <div className="flex-1 overflow-y-auto pr-1 pb-24 mt-2">
                  {view === 'Overview' && (
                    <div className="space-y-4">
                       <div className="bg-gradient-to-br from-slate-900 to-slate-800 text-white p-6 rounded-3xl shadow-xl border border-slate-800">
                          <p className="text-[10px] uppercase font-bold text-slate-400 mb-5 tracking-widest flex justify-between">
                            <span>P&L Dashboard</span><span className="text-indigo-300">{dateFilter}</span>
                          </p>
                          <div className="space-y-4">
                            <div className="flex justify-between items-center text-sm font-medium"><span className="text-slate-300">Gross Product Sales</span> <span className="font-bold text-white text-base">Rs. {reportEngine.kpis.productRevenue.toLocaleString()}</span></div>
                            <div className="flex justify-between items-center text-sm font-medium"><span className="text-rose-300">Total COGS (Cost)</span> <span className="font-bold text-rose-300">- Rs. {reportEngine.kpis.totalCOGS.toLocaleString()}</span></div>
                            <div className="flex justify-between items-center text-sm font-medium"><span className="text-indigo-300">Product Margin</span> <span className="font-bold text-indigo-300">Rs. {reportEngine.kpis.grossMargin.toLocaleString()}</span></div>
                            <div className="h-px bg-slate-700 my-2"></div>
                            <div className="flex justify-between items-center text-xs font-medium"><span className="text-slate-400">Delivery Billed to Customers</span> <span className="font-bold text-slate-300">+ Rs. {reportEngine.kpis.deliveryBilled.toLocaleString()}</span></div>
                            <div className="flex justify-between items-center text-xs font-medium"><span className="text-rose-400">Driver Transport Expenses</span> <span className="font-bold text-rose-400">- Rs. {reportEngine.kpis.transportExpense.toLocaleString()}</span></div>
                            <div className="flex justify-between items-center text-xs font-medium"><span className="text-rose-400">General Operational Expenses</span> <span className="font-bold text-rose-400">- Rs. {reportEngine.kpis.totalExpenses.toLocaleString()}</span></div>
                            <div className="h-px bg-slate-700 my-2"></div>
                            <div className="flex justify-between items-center"><span className="font-bold uppercase tracking-widest text-emerald-400 text-xs">Total Net Profit</span><span className="font-black text-3xl text-emerald-400 tracking-tight">Rs. {reportEngine.kpis.netProfit.toLocaleString()}</span></div>
                          </div>
                       </div>
                       
                       {view === 'Overview' && (
                          <div className="bg-white p-5 rounded-2xl border border-rose-100 shadow-sm bg-rose-50/30">
                             <p className="text-[10px] font-bold uppercase text-rose-600 flex items-center gap-1.5 tracking-wider"><AlertCircle size={14}/> All-Time Receivables</p>
                             <p className="text-2xl font-black text-rose-700 mt-2 tracking-tight">Rs. {reportEngine.kpis.totalReceivables.toLocaleString()}</p>
                          </div>
                       )}
                    </div>
                  )}

                  {view === 'By Product' && renderTable(reportEngine.byProduct, 'Product')}
                  {view === 'By Company' && renderTable(reportEngine.byCompany, 'Company')}
                  {view === 'By Customer' && renderTable(reportEngine.byCustomer, 'Customer')}
                  
                  {view === 'Receivables' && (
                     <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 mt-4">
                        <h3 className="font-bold text-slate-800 mb-4 border-b border-slate-100 pb-3 text-sm tracking-wide">Aging Receivables Report</h3>
                        <div className="space-y-3.5">
                          {reportEngine.receivablesList.map((r, i) => (
                            <div key={i} className="flex justify-between items-center"><span className="font-semibold text-sm text-slate-700">{r.name}</span><span className="font-extrabold text-rose-600 text-sm">Rs. {r.amount.toLocaleString()}</span></div>
                          ))}
                        </div>
                     </div>
                  )}
                </div>
              </div>
            );
          };

          const ExpensesView = () => {
            const [date, setDate] = useState(getLocalDateStr());
            const [amount, setAmount] = useState('');
            const [category, setCategory] = useState(expenseCategories[0]?.name || '');
            const [note, setNote] = useState('');

            const saveExpense = async () => {
               if(!amount || !category) return showToast("Amount & Category required", "error");
               const newExp = {id: Date.now(), date, category, amount: Number(amount), note};
               await saveToFirebase('expenses', newExp.id, newExp);
               setAmount(''); setNote('');
               showToast("Expense Recorded");
            };

            return (
              <div className="h-full flex flex-col p-4 pb-24">
                 <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm mb-6">
                    <div className="flex justify-between items-center mb-3">
                       <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest">Record New Expense</h3>
                       <button onClick={() => setShowExpenseCatModal(true)} className="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-md uppercase tracking-wider">Manage Labels</button>
                    </div>
                    
                    <div className="grid grid-cols-2 gap-3 mb-3">
                       <div>
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1 mb-1 block">Date</label>
                         <input type="date" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-semibold outline-none" value={date} onChange={e=>setDate(e.target.value)}/>
                       </div>
                       <div>
                         <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1 mb-1 block">Category</label>
                         <select className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-semibold outline-none" value={category} onChange={e=>setCategory(e.target.value)}>
                            <option value="">-- Select --</option>
                            {expenseCategories.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}
                         </select>
                       </div>
                    </div>
                    <div className="mb-3">
                       <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1 mb-1 block">Amount</label>
                       <input type="number" placeholder="0.00" className="w-full p-3 bg-white border border-rose-200 text-rose-600 rounded-xl text-lg font-extrabold outline-none focus:border-rose-400" value={amount} onChange={e=>setAmount(e.target.value)}/>
                    </div>
                    <div className="mb-4">
                       <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider ml-1 mb-1 block">Short Note</label>
                       <input type="text" placeholder="e.g. Paid to Ali for DHA drop" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-semibold outline-none" value={note} onChange={e=>setNote(e.target.value)}/>
                    </div>
                    <button onClick={saveExpense} className="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3.5 rounded-xl shadow-md">Record Expense</button>
                 </div>

                 <div className="flex-1 overflow-y-auto pr-1">
                    <h3 className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-3 border-b border-slate-200 pb-2">Expense History</h3>
                    <div className="space-y-3">
                       {expenses.slice().reverse().map(exp => (
                         <div key={exp.id} className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex justify-between items-center">
                            <div>
                              <p className="font-bold text-slate-800 text-sm flex items-center gap-1.5"><Tag size={12} className="text-slate-400"/> {exp.category}</p>
                              <p className="text-[11px] text-slate-500 font-medium mt-0.5">{exp.date} • {exp.note}</p>
                            </div>
                            <div className="text-right">
                              <p className="font-extrabold text-rose-600 text-base">Rs. {exp.amount.toLocaleString()}</p>
                              <button onClick={async ()=>{ if(window.confirm("Delete expense?")) await deleteFromFirebase('expenses', exp.id) }} className="text-[10px] text-slate-400 hover:text-rose-500 font-bold uppercase mt-1">Delete</button>
                            </div>
                         </div>
                       ))}
                    </div>
                 </div>
              </div>
            );
          };

          const BulkOpsView = () => {
            const [bulkProducts, setBulkProducts] = useState([]);

            useEffect(() => { setBulkProducts(products); }, [products]);

            const handleBulkSave = async () => {
               let updatedCount = 0;
               for (const bp of bulkProducts) {
                   const orig = products.find(p => p.id === bp.id);
                   if (orig && (orig.costPrice !== bp.costPrice || orig.sellingPrice !== bp.sellingPrice || orig.available !== bp.available || orig.name !== bp.name || orig.unit !== bp.unit || orig.unitsInBox !== bp.unitsInBox)) {
                       await saveToFirebase('products', bp.id, {...orig, ...bp});
                       updatedCount++;
                   }
               }
               showToast(`Updated ${updatedCount} items prospectively!`);
            };

            const downloadImportTemplate = () => {
               const templateData = [
                  { Name: "Sample Product A", Company: "Pharma Co", Unit: "Vial", BoxQty: 1, Cost: 100, Selling: 150 },
                  { Name: "Sample Product B", Company: "AgriMed", Unit: "Strip", BoxQty: 10, Cost: 500, Selling: 650 }
               ];
               exportToCSV(templateData, 'Item_Import_Template.csv');
            };

            const handleImportCSV = (e) => {
               const file = e.target.files[0];
               if (!file) return;

               const reader = new FileReader();
               reader.onload = async (event) => {
                  const text = event.target.result;
                  const rows = text.match(/[^\r\n]+/g);
                  if(!rows || rows.length < 2) return showToast("File is empty or invalid", "error");

                  const headers = rows[0].split(',').map(h => h.trim().toLowerCase().replace(/"/g, ''));
                  const reqHeaders = ['name', 'company', 'unit', 'boxqty', 'cost', 'selling'];
                  const missing = reqHeaders.filter(h => !headers.includes(h));
                  if(missing.length > 0) return showToast(`Missing columns: ${missing.join(', ')}`, "error");

                  let addedCount = 0;
                  let updatedCount = 0;

                  for (let i = 1; i < rows.length; i++) {
                     const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                     if(cols.length < reqHeaders.length) continue; 

                     const rowData = {};
                     reqHeaders.forEach(h => { rowData[h] = cols[headers.indexOf(h)]; });
                     if(!rowData.name || !rowData.selling || !rowData.cost) continue;

                     let compId;
                     const compName = rowData.company || 'Unknown';
                     const existingComp = companies.find(c => c.name.toLowerCase() === compName.toLowerCase());
                     if (existingComp) {
                       compId = existingComp.id;
                     } else {
                       compId = Date.now() + Math.random();
                       await saveToFirebase('companies', compId, { id: compId, name: compName });
                     }

                     const existingProd = products.find(p => p.name.toLowerCase() === rowData.name.toLowerCase());
                     const prodObj = {
                        name: rowData.name, companyId: compId, unit: rowData.unit || 'Unit',
                        unitsInBox: Number(rowData.boxqty) || 1, costPrice: Number(rowData.cost) || 0,
                        sellingPrice: Number(rowData.selling) || 0, available: true
                     };

                     if (existingProd) {
                        await saveToFirebase('products', existingProd.id, { ...existingProd, ...prodObj });
                        updatedCount++;
                     } else {
                        const newId = Date.now() + Math.random();
                        await saveToFirebase('products', newId, { ...prodObj, id: newId });
                        addedCount++;
                     }
                  }
                  showToast(`Success! ${addedCount} added, ${updatedCount} updated.`);
               };
               reader.readAsText(file);
               e.target.value = '';
            };

            return (
              <div className="h-full flex flex-col p-4 pb-24">
                 <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm mb-4">
                    <h3 className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-3 flex items-center gap-1.5"><Download size={14} className="text-indigo-600"/> Export Data</h3>
                    <div className="flex gap-3">
                       <button onClick={() => {
                         const data = products.map(p => ({ ID: p.id, Name: p.name, Company: getCompanyName(p.companyId), Unit: p.unit, BoxQty: p.unitsInBox, Cost: p.costPrice, Selling: p.sellingPrice, Status: p.available ? 'In Stock' : 'Out' }));
                         exportToCSV(data, 'Products_Master.csv');
                       }} className="flex-1 bg-indigo-50 border border-indigo-100 text-indigo-700 py-2.5 rounded-xl font-bold text-xs shadow-sm">Export Items</button>
                       <button onClick={() => {
                         const data = customers.map(c => ({ ID: c.id, Name: c.name, Contact: c.contactPerson, Phone: c.phone, Address1: c.address1, Map1: c.map1 }));
                         exportToCSV(data, 'Customers_Master.csv');
                       }} className="flex-1 bg-indigo-50 border border-indigo-100 text-indigo-700 py-2.5 rounded-xl font-bold text-xs shadow-sm">Export Clients</button>
                    </div>
                 </div>

                 <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm mb-4">
                    <h3 className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-2 flex items-center gap-1.5"><Upload size={14} className="text-emerald-600"/> Import Inventory</h3>
                    <p className="text-[10px] text-slate-500 mb-3 leading-tight">Upload a CSV file to add new items or update prices. Existing items with the exact same name will be updated.</p>
                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-200 mb-3">
                       <span className="text-[9px] font-bold text-slate-500 uppercase tracking-widest block mb-1">Required CSV Columns:</span>
                       <code className="text-[10px] font-mono text-indigo-600 font-bold tracking-tight">Name, Company, Unit, BoxQty, Cost, Selling</code>
                    </div>
                    <div className="flex gap-3">
                       <button onClick={downloadImportTemplate} className="flex-1 bg-white border border-slate-300 text-slate-700 py-2.5 rounded-xl font-bold text-xs shadow-sm">Get Template</button>
                       <label className="flex-[1.5] bg-emerald-500 text-white py-2.5 rounded-xl font-bold text-xs shadow-sm cursor-pointer text-center flex items-center justify-center">
                          <input type="file" accept=".csv" className="hidden" onChange={handleImportCSV} />
                          Select & Import CSV
                       </label>
                    </div>
                 </div>

                 <div className="flex-1 bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col overflow-hidden">
                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                       <h3 className="font-bold text-slate-800 text-sm flex items-center gap-2"><ArrowUpDown size={16}/> Quick Price Edit</h3>
                       <button onClick={handleBulkSave} className="bg-emerald-500 text-white px-4 py-2 rounded-lg font-bold text-xs shadow-sm">Save All</button>
                    </div>
                    <div className="flex-1 overflow-auto p-2">
                       <table className="w-full text-left text-xs whitespace-nowrap min-w-[800px]">
                          <thead className="text-slate-500 uppercase font-bold tracking-wider">
                             <tr>
                                <th className="p-2 pb-3">Product Name</th>
                                <th className="p-2 pb-3 w-20">Unit</th>
                                <th className="p-2 pb-3 w-20">Box Qty</th>
                                <th className="p-2 pb-3 w-24">Cost</th>
                                <th className="p-2 pb-3 w-24">Selling</th>
                                <th className="p-2 pb-3 w-20 text-center">Active</th>
                             </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                             {bulkProducts.map(p => (
                                <tr key={p.id} className="hover:bg-slate-50">
                                   <td className="p-2"><input type="text" className="w-full p-1.5 bg-slate-50 border border-slate-200 rounded font-semibold text-slate-800 outline-none focus:border-indigo-400" value={p.name} onChange={e => setBulkProducts(bulkProducts.map(bp=>bp.id===p.id?{...bp, name: e.target.value}:bp))} /></td>
                                   <td className="p-2"><input type="text" className="w-full p-1.5 bg-slate-50 border border-slate-200 rounded font-semibold text-slate-800 outline-none focus:border-indigo-400" value={p.unit} onChange={e => setBulkProducts(bulkProducts.map(bp=>bp.id===p.id?{...bp, unit: e.target.value}:bp))} /></td>
                                   <td className="p-2"><input type="number" className="w-full p-1.5 bg-slate-50 border border-slate-200 rounded font-semibold text-slate-800 outline-none focus:border-indigo-400" value={p.unitsInBox} onChange={e => setBulkProducts(bulkProducts.map(bp=>bp.id===p.id?{...bp, unitsInBox: Number(e.target.value)}:bp))} /></td>
                                   <td className="p-2"><input type="number" className="w-full p-1.5 bg-slate-50 border border-slate-200 rounded font-bold text-slate-800 outline-none focus:border-indigo-400" value={p.costPrice} onChange={e => setBulkProducts(bulkProducts.map(bp=>bp.id===p.id?{...bp, costPrice: Number(e.target.value)}:bp))} /></td>
                                   <td className="p-2"><input type="number" className="w-full p-1.5 bg-slate-50 border border-slate-200 rounded font-bold text-emerald-700 outline-none focus:border-indigo-400" value={p.sellingPrice} onChange={e => setBulkProducts(bulkProducts.map(bp=>bp.id===p.id?{...bp, sellingPrice: Number(e.target.value)}:bp))} /></td>
                                   <td className="p-2 text-center"><input type="checkbox" checked={p.available} onChange={e => setBulkProducts(bulkProducts.map(bp=>bp.id===p.id?{...bp, available: e.target.checked}:bp))} className="w-4 h-4 accent-indigo-600" /></td>
                                </tr>
                             ))}
                          </tbody>
                       </table>
                    </div>
                 </div>
              </div>
            );
          };

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-[Inter,system-ui,sans-serif] flex flex-col max-w-md mx-auto relative shadow-2xl overflow-x-hidden print:hidden">
              <header className="bg-white/80 backdrop-blur-md px-5 py-4 flex justify-between items-center shadow-sm z-10 sticky top-0 border-b border-slate-100">
                <div>
                  <h1 className="text-xl font-extrabold bg-gradient-to-r from-indigo-700 to-blue-500 bg-clip-text text-transparent tracking-tight leading-none pb-0.5">{APP_NAME}</h1>
                  <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mt-1.5 flex items-center gap-1"><span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> {currentUser?.name}</p>
                </div>
                <button onClick={() => setCurrentUser(null)} className="text-[10px] font-bold uppercase tracking-widest text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg hover:bg-slate-200">Log Out</button>
              </header>

              <main className="flex-1 overflow-hidden h-full">
                {activeTab === 'dashboard' && <DashboardTab />}
                {activeTab === 'products' && <ProductsTab />}
                {activeTab === 'billing' && <BillingTab />}
                {activeTab === 'customers' && <CustomersTab />}
                {activeTab === 'admin' && <AdminTab />}
              </main>

              <nav className="bg-white/90 backdrop-blur-md border-t border-slate-200 flex items-center justify-between pb-6 pt-3 px-2 z-10 fixed bottom-0 w-full max-w-md shadow-[0_-10px_20px_rgba(0,0,0,0.03)]">
                {[
                  { id: 'dashboard', icon: LayoutDashboard, label: 'Home' },
                  { id: 'products', icon: Package, label: 'Items' },
                  { id: 'billing', icon: ReceiptText, label: 'Billing' },
                  { id: 'customers', icon: Users, label: 'Clients' },
                  { id: 'admin', icon: Settings, label: 'Admin', adminOnly: true },
                ].map(tab => {
                  if (tab.adminOnly && !isAdmin) return null;
                  const active = activeTab === tab.id;
                  return (
                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center w-full transition-all ${active ? 'text-indigo-600' : 'text-slate-400'}`}>
                      <div className={`p-1.5 rounded-xl transition-all ${active ? 'bg-indigo-50 shadow-sm' : ''}`}><tab.icon size={22} strokeWidth={active ? 2.5 : 2} /></div>
                      <span className={`text-[9px] font-bold uppercase tracking-widest ${active ? 'text-indigo-700 mt-1' : 'mt-0.5'}`}>{tab.label}</span>
                    </button>
                  );
                })}
              </nav>

              {showProductModal && <ProductModal />}
              {showCustomerModal && <CustomerModal />}
              {showLedgerModal && <CustomerLedgerModal />}
              {showPaymentModal && <PaymentModal />}
              {showExpenseCatModal && <ExpenseCategoryModal />}
              {showUserModal && <UserModal />}

              {toast && (
                <div className={`fixed top-24 left-1/2 -translate-x-1/2 px-5 py-3 rounded-2xl shadow-xl z-[100] font-semibold text-white flex items-center gap-2.5 text-sm transition-all animate-slide-up ${toast.type === 'error' ? 'bg-rose-600' : 'bg-slate-800'}`}>
                  {toast.type === 'error' ? <AlertCircle size={18}/> : <CheckCircle2 size={18} className="text-emerald-400"/>}
                  {toast.msg}
                </div>
              )}

              <style>{`
                @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
                * { font-family: 'Inter', system-ui, sans-serif; }
                @keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
                .animate-slide-up { animation: slide-up 0.2s cubic-bezier(0.16, 1, 0.3, 1); }
                .scrollbar-hide::-webkit-scrollbar { display: none; }
                /* Disable arrows on number inputs */
                input[type="number"]::-webkit-inner-spin-button, 
                input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
                input[type="number"] { -moz-appearance: textfield; }
                
                /* Multi-Page Safe Printing Rules */
                @media print { 
                    body { background: white !important; margin: 0 !important; padding: 0 !important; }
                    table { page-break-inside: auto; width: 100%; border-collapse: collapse; } 
                    tr { page-break-inside: avoid; page-break-after: auto; } 
                    thead { display: table-header-group; } 
                    tfoot { display: table-footer-group; }
                    .print\\:hidden { display: none !important; }
                }
              `}</style>
            </div>
          );
        }

        // --- Render the App ---
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
